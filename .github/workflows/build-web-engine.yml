name: Build Godot Web Engine (WeChat compatible)

on:
  workflow_dispatch:
    inputs:
      godot_version:
        description: 'Godot source tag (e.g. 4.4-stable)'
        required: true
        default: '4.4-stable'
        type: choice
        options:
          - '4.3-stable'
          - '4.4-stable'
          - '4.4.1-stable'
          - '4.5-stable'
          - '4.5.1-stable'
          - '4.5.2-stable'
      emsdk_version:
        description: 'Emscripten SDK version'
        required: true
        default: 'latest'
        type: string
      publish_release:
        description: 'Publish as GitHub Release?'
        required: false
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  build:
    name: Build Godot Web (no Wasm EH)
    runs-on: ubuntu-latest
    steps:
      - name: Clone Godot source
        run: |
          git clone --depth 1 --branch ${{ inputs.godot_version }} https://github.com/godotengine/godot.git godot-src
          echo "Godot ${{ inputs.godot_version }} at: $(cd godot-src && git rev-parse --short HEAD)"

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: ${{ inputs.emsdk_version }}
          actions-cache-folder: emsdk-cache

      - name: Verify Emscripten
        run: emcc --version

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y scons pkg-config build-essential

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build Godot Web (template_release)
        working-directory: godot-src
        run: |
          scons platform=web target=template_release             dlink_enabled=yes             exceptions=disabled             -j$(nproc)

      - name: Save release .web_zip before debug build
        run: |
          mkdir -p web-zip-release
          cp godot-src/bin/.web_zip/* web-zip-release/ 2>/dev/null || true

      - name: Build Godot Web (template_debug)
        working-directory: godot-src
        run: |
          scons platform=web target=template_debug             dlink_enabled=yes             exceptions=disabled             -j$(nproc)

      - name: Collect engine output
        run: |
          mkdir -p engine-out/release engine-out/debug

          echo "=== All files in godot-src/bin/ ==="
          find godot-src/bin/ -type f | sort

          # Release: from saved .web_zip (before debug build overwrote it)
          echo "=== Release web_zip files ==="
          ls -lh web-zip-release/
          cp web-zip-release/godot.js engine-out/release/godot.js 2>/dev/null || true
          cp web-zip-release/godot.wasm engine-out/release/godot.wasm 2>/dev/null || true
          cp web-zip-release/godot.side.wasm engine-out/release/godot.side.wasm 2>/dev/null || true

          # Debug: from current .web_zip (debug build was last)
          echo "=== Debug web_zip files ==="
          ls -lh godot-src/bin/.web_zip/
          cp godot-src/bin/.web_zip/godot.js engine-out/debug/godot.js 2>/dev/null || true
          cp godot-src/bin/.web_zip/godot.wasm engine-out/debug/godot.wasm 2>/dev/null || true
          cp godot-src/bin/.web_zip/godot.side.wasm engine-out/debug/godot.side.wasm 2>/dev/null || true

          # Also copy extra web files
          cp godot-src/bin/.web_zip/godot.audio.position.worklet.js engine-out/ 2>/dev/null || true
          cp godot-src/bin/.web_zip/godot.audio.worklet.js engine-out/ 2>/dev/null || true
          cp godot-src/bin/.web_zip/godot.html engine-out/ 2>/dev/null || true
          cp godot-src/bin/.web_zip/godot.offline.html engine-out/ 2>/dev/null || true
          cp godot-src/bin/.web_zip/godot.service.worker.js engine-out/ 2>/dev/null || true

          echo "=== Engine output (release) ==="
          ls -lh engine-out/release/
          echo "=== Engine output (debug) ==="
          ls -lh engine-out/debug/

          # Verify critical files
          MISSING=0
          for f in engine-out/release/godot.js engine-out/release/godot.wasm engine-out/debug/godot.js engine-out/debug/godot.wasm; do
            if [ ! -f "$f" ]; then
              echo "ERROR: Missing $f"
              MISSING=1
            fi
          done
          if [ "$MISSING" = "1" ]; then
            echo "FATAL: Critical engine files are missing!"
            exit 1
          fi

      - name: Upload engine artifacts
        uses: actions/upload-artifact@v4
        with:
          name: godot-web-noeh-${{ inputs.godot_version }}
          path: engine-out/
          retention-days: 90

  package:
    name: Package .tpz with custom engine
    needs: build
    if: inputs.publish_release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download engine artifacts
        uses: actions/download-artifact@v4
        with:
          name: godot-web-noeh-${{ inputs.godot_version }}
          path: engine-out/

      - name: Download upstream .tpz template
        shell: bash
        run: |
          case "${{ inputs.godot_version }}" in
            4.3-stable)   TPZ_VER="4.3.0"; TPZ_FILE="minigame4.3.0.3.tpz" ;;
            4.4-stable)   TPZ_VER="4.4.0"; TPZ_FILE="minigame4.4.0.1.tpz" ;;
            4.4.1-stable) TPZ_VER="4.4.0"; TPZ_FILE="minigame4.4.0.1.tpz" ;;
            4.5-stable)   TPZ_VER="4.5.1"; TPZ_FILE="minigame4.5.1.tpz" ;;
            4.5.1-stable) TPZ_VER="4.5.1"; TPZ_FILE="minigame4.5.1.tpz" ;;
            4.5.2-stable) TPZ_VER="4.5.1"; TPZ_FILE="minigame4.5.1.tpz" ;;
            *) echo "Unknown version"; exit 1 ;;
          esac
          echo "TPZ_VER=$TPZ_VER" >> $GITHUB_ENV
          echo "TPZ_FILE=$TPZ_FILE" >> $GITHUB_ENV
          curl -L -o "upstream.tpz" "https://github.com/godothub/godot-minigame/releases/download/${TPZ_VER}/${TPZ_FILE}"

      - name: Replace engine in .tpz
        shell: bash
        run: |
          mkdir -p tpz-work
          cd tpz-work
          unzip ../upstream.tpz

          echo "=== Original engine ==="
          ls -lh engine/

          echo "=== Custom engine (release) ==="
          ls -lh ../engine-out/release/

          # Replace with our custom build
          cp ../engine-out/release/godot.js engine/godot.js
          cp ../engine-out/release/godot.wasm engine/godot.wasm

          # Compress wasm with brotli
          sudo apt-get install -y brotli
          brotli engine/godot.wasm

          echo "=== Replaced engine ==="
          ls -lh engine/

          # Repackage as .tpz
          mkdir -p ../release
          cd .. && cd tpz-work && zip -r ../release/minigame-noeh-${TPZ_VER}.tpz . && cd ..

          # Also ship raw engine files for manual replacement
          mkdir -p release/raw
          cp engine-out/release/godot.js release/raw/godot.js
          cp engine-out/release/godot.wasm release/raw/godot.wasm
          cp engine-out/debug/godot.js release/raw/godot.debug.js
          cp engine-out/debug/godot.wasm release/raw/godot.debug.wasm

          echo "=== Release contents ==="
          ls -lhR release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: wechat-noeh-${{ inputs.godot_version }}
          name: WeChat-compatible (no Wasm EH) - Godot ${{ inputs.godot_version }}
          body: |
            Custom Godot Web engine build with Wasm Exception Handling disabled, compatible with WeChat Mini Game runtime.

            ## Problem solved
            WeChat Mini Game WASM runtime does not support Wasm EH, causing:
            CompileError: Invalid opcode 0x6 (enable with --experimental-wasm-eh)

            ## Build options
            - exceptions=disabled - disable Wasm EH instructions
            - dlink_enabled=yes - keep GDExtension support
            - Emscripten ${{ inputs.emsdk_version }}

            ## Downloads
            - minigame-noeh-*.tpz - full template (replace upstream .tpz directly)
            - raw/ - standalone engine files (for manual replacement)

            ## Usage
            1. Download .tpz and replace the upstream template in addons/godot-minigame/templates/
            2. Or replace files in the export engine/ directory with raw/ files
          files: |
            release/minigame-noeh-*.tpz
            release/raw/*

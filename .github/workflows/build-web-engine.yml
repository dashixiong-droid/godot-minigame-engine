name: Build Godot Web Engine (WeChat compatible)

on:
  workflow_dispatch:
    inputs:
      godot_version:
        description: 'Godot source tag (e.g. 4.4-stable)'
        required: true
        default: '4.4-stable'
        type: choice
        options:
          - '4.3-stable'
          - '4.4-stable'
          - '4.4.1-stable'
          - '4.5-stable'
          - '4.5.1-stable'
          - '4.5.2-stable'
      emsdk_version:
        description: 'Emscripten SDK version'
        required: true
        default: '3.1.63'
        type: string
      publish_release:
        description: 'Publish as GitHub Release?'
        required: false
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  build:
    name: Build Godot Web (no Wasm EH)
    runs-on: ubuntu-latest
    steps:
      - name: Clone Godot source
        run: |
          git clone --depth 1 --branch ${{ inputs.godot_version }} https://github.com/godotengine/godot.git godot-src
          echo "Godot ${{ inputs.godot_version }} at: $(cd godot-src && git rev-parse --short HEAD)"

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: ${{ inputs.emsdk_version }}
          actions-cache-folder: emsdk-cache

      - name: Verify Emscripten
        run: emcc --version

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y scons pkg-config build-essential

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build Godot Web (template_release)
        working-directory: godot-src
        run: |
          scons platform=web target=template_release \
            dlink_enabled=yes \
            exceptions=disabled \
            -j$(nproc)

      - name: Build Godot Web (template_debug)
        working-directory: godot-src
        run: |
          scons platform=web target=template_debug \
            dlink_enabled=yes \
            exceptions=disabled \
            -j$(nproc)

      - name: Collect engine output
        run: |
          mkdir -p engine-out
          cp godot-src/bin/godot.web.template_release.wasm32.js engine-out/ 2>/dev/null || true
          cp godot-src/bin/godot.web.template_release.wasm32.wasm engine-out/ 2>/dev/null || true
          cp godot-src/bin/godot.web.template_debug.wasm32.js engine-out/ 2>/dev/null || true
          cp godot-src/bin/godot.web.template_debug.wasm32.wasm engine-out/ 2>/dev/null || true
          echo "=== Engine output ==="
          ls -lh engine-out/

      - name: Upload engine artifacts
        uses: actions/upload-artifact@v4
        with:
          name: godot-web-noeh-${{ inputs.godot_version }}
          path: engine-out/
          retention-days: 90

  package:
    name: Package .tpz with custom engine
    needs: build
    if: inputs.publish_release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download engine artifacts
        uses: actions/download-artifact@v4
        with:
          name: godot-web-noeh-${{ inputs.godot_version }}
          path: engine-out/

      - name: Download upstream .tpz template
        shell: bash
        run: |
          case "${{ inputs.godot_version }}" in
            4.3-stable)   TPZ_VER="4.3.0"; TPZ_FILE="minigame4.3.0.3.tpz" ;;
            4.4-stable)   TPZ_VER="4.4.0"; TPZ_FILE="minigame4.4.0.1.tpz" ;;
            4.4.1-stable) TPZ_VER="4.4.0"; TPZ_FILE="minigame4.4.0.1.tpz" ;;
            4.5-stable)   TPZ_VER="4.5.1"; TPZ_FILE="minigame4.5.1.tpz" ;;
            4.5.1-stable) TPZ_VER="4.5.1"; TPZ_FILE="minigame4.5.1.tpz" ;;
            4.5.2-stable) TPZ_VER="4.5.1"; TPZ_FILE="minigame4.5.1.tpz" ;;
            *) echo "Unknown version"; exit 1 ;;
          esac
          echo "TPZ_VER=$TPZ_VER" >> $GITHUB_ENV
          echo "TPZ_FILE=$TPZ_FILE" >> $GITHUB_ENV
          curl -L -o "upstream.tpz" "https://github.com/godothub/godot-minigame/releases/download/${TPZ_VER}/${TPZ_FILE}"

      - name: Replace engine in .tpz
        shell: bash
        run: |
          mkdir -p tpz-work
          cd tpz-work
          unzip ../upstream.tpz

          echo "=== Original engine ==="
          ls -lh engine/

          echo "=== Custom engine ==="
          ls -lh ../engine-out/

          # Replace with our custom build
          cp ../engine-out/godot.web.template_release.wasm32.js engine/godot.js
          cp ../engine-out/godot.web.template_release.wasm32.wasm engine/godot.wasm

          # Compress wasm with brotli
          sudo apt-get install -y brotli
          brotli engine/godot.wasm

          echo "=== Replaced engine ==="
          ls -lh engine/

          # Repackage as .tpz
          cd ..
          cd tpz-work && zip -r ../release/minigame-noeh-${TPZ_VER}.tpz . && cd ..

          # Also ship raw engine files for manual replacement
          mkdir -p release/raw
          cp engine-out/godot.web.template_release.wasm32.js release/raw/godot.js
          cp engine-out/godot.web.template_release.wasm32.wasm release/raw/godot.wasm

          echo "=== Release contents ==="
          ls -lhR release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: wechat-noeh-${{ inputs.godot_version }}
          name: WeChat-compatible (no Wasm EH) - Godot ${{ inputs.godot_version }}
          body: |
            定制编译 Godot Web 引擎，**禁用 Wasm Exception Handling**，兼容微信小游戏运行时。

            ## 解决的问题
            微信小游戏 WASM 运行时不支持 Wasm EH，导致报错：
            `CompileError: Invalid opcode 0x6 (enable with --experimental-wasm-eh)`

            ## 编译选项
            - `exceptions=disabled` — 禁用 Wasm EH 指令
            - `dlink_enabled=yes` — 保留 GDExtension 支持
            - Emscripten ${{ inputs.emsdk_version }}

            ## 下载
            - `minigame-noeh-*.tpz` — 完整模板（可直接替换上游 .tpz）
            - `raw/` — 单独的 godot.js + godot.wasm（手动替换用）

            ## 使用
            1. 下载 `.tpz` 替换 `addons/godot-minigame/templates/` 中的上游模板
            2. 或将 `raw/` 中的文件替换导出目录 `engine/` 下的同名文件
          files: |
            release/minigame-noeh-*.tpz
            release/raw/*
